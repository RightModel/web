name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
    types: [cache-updated]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_GA4_MEASUREMENT_ID: ${{ vars.PUBLIC_GA4_MEASUREMENT_ID }}
      PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.PUBLIC_GOOGLE_SITE_VERIFICATION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - run: npm ci
      - run: npm ci --prefix functions
      - run: npm run validate:content
      - run: npm run lint
      - run: npm run test

  build-and-deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RIGHTMODEL_GCP_PROJECT_ID: ${{ vars.RIGHTMODEL_GCP_PROJECT_ID }}
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_GA4_MEASUREMENT_ID: ${{ vars.PUBLIC_GA4_MEASUREMENT_ID }}
      PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.PUBLIC_GOOGLE_SITE_VERIFICATION }}
      RIGHTMODEL_CACHE_BUCKET: ${{ vars.RIGHTMODEL_CACHE_BUCKET }}
      RIGHTMODEL_VERTEX_MODEL: ${{ vars.RIGHTMODEL_VERTEX_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - run: npm ci
      - run: npm ci --prefix functions
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ vars.RIGHTMODEL_GCP_PROJECT_ID }}
      - run: npm install -g firebase-tools
      - run: npm run write:functions-env
      - run: npm run fetch:caches
      - run: npm run build
      - name: Deploy Hosting and Functions
        run: firebase deploy --only hosting,functions --project ${{ vars.RIGHTMODEL_GCP_PROJECT_ID }} --non-interactive
